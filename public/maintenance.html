<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .dot-loader {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .dot-loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
    .retry {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
  <script>
    // Auto-refresh every 10 seconds to check if site is back
    setTimeout(function() { location.reload(); }, 10000);
  </script>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 6V12L16 14"/>
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <h1>We'll be right back</h1>
    <p>We're updating the system to bring you new features and improvements. This usually takes less than a minute.</p>
    <div class="dot-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="retry">This page will automatically refresh...</p>
  </div>
</body>
</html>
