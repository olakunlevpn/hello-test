<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .loading-verb {
      font-size: 0.95rem;
      color: #84cc16;
      font-weight: 500;
      min-height: 1.5em;
      transition: opacity 0.3s ease;
    }
    .loading-verb.fade { opacity: 0; }
    .retry {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
  <meta http-equiv="refresh" content="10">
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#84cc16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 6V12L16 14"/>
      <circle cx="12" cy="12" r="10"/>
    </svg>
    <h1>We'll be right back</h1>
    <p>We're updating the system to bring you new features and improvements. This usually takes less than a minute.</p>
    <div class="loading-verb" id="verb">Loading...</div>
    <p class="retry">This page will automatically refresh...</p>
  </div>
  <script>
    var verbs=["Accomplishing","Architecting","Baking","Beaming","Bootstrapping","Brewing","Calculating","Cascading","Channeling","Choreographing","Churning","Coalescing","Composing","Computing","Concocting","Contemplating","Cooking","Crafting","Creating","Crunching","Crystallizing","Cultivating","Deciphering","Deliberating","Enchanting","Envisioning","Fermenting","Forging","Forming","Garnishing","Generating","Germinating","Grooving","Harmonizing","Hashing","Hatching","Ideating","Imagining","Improvising","Incubating","Infusing","Kneading","Manifesting","Marinating","Metamorphosing","Mulling","Orchestrating","Percolating","Pondering","Processing","Proofing","Puzzling","Ruminating","Seasoning","Simmering","Sketching","Spinning","Sprouting","Stewing","Synthesizing","Tempering","Thinking","Tinkering","Transmuting","Unfurling","Vibing","Whisking","Working","Wrangling","Zesting"];
    var el=document.getElementById("verb");
    function next(){
      el.classList.add("fade");
      setTimeout(function(){
        el.textContent=verbs[Math.floor(Math.random()*verbs.length)]+"...";
        el.classList.remove("fade");
      },300);
    }
    next();
    setInterval(next,2000);
  </script>
</body>
</html>
